# ═══════════════════════════════════════════════════════════════════════
# DBnwind Training Examples — REAL business questions, NOT trivial lookups
# ═══════════════════════════════════════════════════════════════════════
# Design principles:
#   1. Every example teaches the model a BUSINESS pattern, not just syntax
#   2. Complex JOINs with aggregations are prioritized
#   3. Revenue = UnitPrice * Quantity * (1 - Discount) is reinforced
#   4. Arabic questions match real user queries
#   5. No duplicate/trivial "show first N rows" examples
# ═══════════════════════════════════════════════════════════════════════

examples:

# ─── Revenue & Sales Patterns ─────────────────────────────────────────

- id: ex_total_revenue
  question_ar: ما إجمالي الإيرادات لكل الطلبات؟
  question_en: What is the total revenue across all orders?
  intent: aggregation
  difficulty: medium
  required_tables:
  - "Order Details"
  required_columns:
  - UnitPrice
  - Quantity
  - Discount
  sql: |
    SELECT SUM(od.UnitPrice * od.Quantity * (1 - od.Discount)) AS [TotalRevenue]
    FROM dbo.[Order Details] AS od;
  explanation: "حساب إجمالي الإيرادات باستخدام معادلة البند: UnitPrice × Quantity × (1 − Discount)"
  safety_notes: []
  confidence: high

- id: ex_revenue_per_customer
  question_ar: ما إجمالي مبيعات كل عميل؟
  question_en: What is the total revenue per customer?
  intent: aggregation_join
  difficulty: advanced
  required_tables:
  - Customers
  - Orders
  - "Order Details"
  required_columns:
  - CompanyName
  - UnitPrice
  - Quantity
  - Discount
  sql: |
    SELECT TOP 50 c.CompanyName,
           SUM(od.UnitPrice * od.Quantity * (1 - od.Discount)) AS [TotalRevenue]
    FROM dbo.Customers AS c
    INNER JOIN dbo.Orders AS o ON c.CustomerID = o.CustomerID
    INNER JOIN dbo.[Order Details] AS od ON o.OrderID = od.OrderID
    GROUP BY c.CompanyName
    ORDER BY [TotalRevenue] DESC;
  explanation: "ربط العملاء بالطلبات ثم ببنود الطلبات لحساب إجمالي إنفاق كل عميل"
  safety_notes: []
  confidence: high

- id: ex_top10_customers_revenue
  question_ar: من أفضل 10 عملاء من حيث الإنفاق؟
  question_en: Who are the top 10 customers by spending?
  intent: ranking
  difficulty: advanced
  required_tables:
  - Customers
  - Orders
  - "Order Details"
  required_columns:
  - CompanyName
  - UnitPrice
  - Quantity
  - Discount
  sql: |
    SELECT TOP 10 c.CompanyName,
           SUM(od.UnitPrice * od.Quantity * (1 - od.Discount)) AS [TotalRevenue]
    FROM dbo.Customers AS c
    INNER JOIN dbo.Orders AS o ON c.CustomerID = o.CustomerID
    INNER JOIN dbo.[Order Details] AS od ON o.OrderID = od.OrderID
    GROUP BY c.CompanyName
    ORDER BY [TotalRevenue] DESC;
  explanation: "ترتيب العملاء حسب إجمالي الإنفاق تنازلياً مع TOP 10"
  safety_notes: []
  confidence: high

- id: ex_monthly_sales_trend
  question_ar: ما اتجاه المبيعات الشهرية؟
  question_en: What is the monthly sales trend?
  intent: time_series
  difficulty: advanced
  required_tables:
  - Orders
  - "Order Details"
  required_columns:
  - OrderDate
  - UnitPrice
  - Quantity
  - Discount
  sql: |
    SELECT YEAR(o.OrderDate) AS [Year],
           MONTH(o.OrderDate) AS [Month],
           SUM(od.UnitPrice * od.Quantity * (1 - od.Discount)) AS [MonthlyRevenue]
    FROM dbo.Orders AS o
    INNER JOIN dbo.[Order Details] AS od ON o.OrderID = od.OrderID
    WHERE o.OrderDate IS NOT NULL
    GROUP BY YEAR(o.OrderDate), MONTH(o.OrderDate)
    ORDER BY [Year], [Month];
  explanation: "تجميع الإيرادات حسب السنة والشهر لعرض الاتجاه الزمني"
  safety_notes: []
  confidence: high

- id: ex_quarterly_revenue
  question_ar: ما إجمالي المبيعات لكل ربع سنة؟
  question_en: What is the total revenue per quarter?
  intent: time_series
  difficulty: advanced
  required_tables:
  - Orders
  - "Order Details"
  required_columns:
  - OrderDate
  - UnitPrice
  - Quantity
  - Discount
  sql: |
    SELECT YEAR(o.OrderDate) AS [Year],
           DATEPART(QUARTER, o.OrderDate) AS [Quarter],
           SUM(od.UnitPrice * od.Quantity * (1 - od.Discount)) AS [QuarterlyRevenue]
    FROM dbo.Orders AS o
    INNER JOIN dbo.[Order Details] AS od ON o.OrderID = od.OrderID
    WHERE o.OrderDate IS NOT NULL
    GROUP BY YEAR(o.OrderDate), DATEPART(QUARTER, o.OrderDate)
    ORDER BY [Year], [Quarter];
  explanation: "استخدام DATEPART(QUARTER, ...) لتجميع المبيعات ربع السنوية"
  safety_notes: []
  confidence: high

# ─── Product Analysis ─────────────────────────────────────────────────

- id: ex_top_products_by_revenue
  question_ar: ما أكثر 10 منتجات من حيث الإيرادات؟
  question_en: What are the top 10 products by revenue?
  intent: ranking
  difficulty: advanced
  required_tables:
  - Products
  - "Order Details"
  required_columns:
  - ProductName
  - UnitPrice
  - Quantity
  - Discount
  sql: |
    SELECT TOP 10 p.ProductName,
           SUM(od.UnitPrice * od.Quantity * (1 - od.Discount)) AS [ProductRevenue]
    FROM dbo.Products AS p
    INNER JOIN dbo.[Order Details] AS od ON p.ProductID = od.ProductID
    GROUP BY p.ProductName
    ORDER BY [ProductRevenue] DESC;
  explanation: "ترتيب المنتجات حسب إجمالي الإيرادات من بنود الطلبات"
  safety_notes: []
  confidence: high

- id: ex_top_products_by_quantity
  question_ar: ما أكثر المنتجات بيعاً من حيث الكمية؟
  question_en: Which products sold the most by quantity?
  intent: ranking
  difficulty: medium
  required_tables:
  - Products
  - "Order Details"
  required_columns:
  - ProductName
  - Quantity
  sql: |
    SELECT TOP 10 p.ProductName,
           SUM(od.Quantity) AS [TotalQuantity]
    FROM dbo.Products AS p
    INNER JOIN dbo.[Order Details] AS od ON p.ProductID = od.ProductID
    GROUP BY p.ProductName
    ORDER BY [TotalQuantity] DESC;
  explanation: "ترتيب المنتجات حسب إجمالي الكمية المباعة"
  safety_notes: []
  confidence: high

- id: ex_category_revenue
  question_ar: ما إجمالي مبيعات كل فئة؟
  question_en: What is the total revenue per category?
  intent: aggregation_join
  difficulty: advanced
  required_tables:
  - Categories
  - Products
  - "Order Details"
  required_columns:
  - CategoryName
  - UnitPrice
  - Quantity
  - Discount
  sql: |
    SELECT c.CategoryName,
           SUM(od.UnitPrice * od.Quantity * (1 - od.Discount)) AS [CategoryRevenue]
    FROM dbo.Categories AS c
    INNER JOIN dbo.Products AS p ON c.CategoryID = p.CategoryID
    INNER JOIN dbo.[Order Details] AS od ON p.ProductID = od.ProductID
    GROUP BY c.CategoryName
    ORDER BY [CategoryRevenue] DESC;
  explanation: "ربط الفئات بالمنتجات ثم ببنود الطلبات لحساب إيرادات كل فئة"
  safety_notes: []
  confidence: high

- id: ex_products_by_category
  question_ar: اعرض المنتجات في كل فئة مع أسعارها
  question_en: Show products in each category with their prices
  intent: lookup_join
  difficulty: medium
  required_tables:
  - Categories
  - Products
  required_columns:
  - CategoryName
  - ProductName
  - UnitPrice
  sql: |
    SELECT TOP 100 c.CategoryName, p.ProductName, p.UnitPrice
    FROM dbo.Categories AS c
    INNER JOIN dbo.Products AS p ON c.CategoryID = p.CategoryID
    WHERE p.Discontinued = 0
    ORDER BY c.CategoryName, p.ProductName;
  explanation: "ربط الفئات بالمنتجات مع تصفية المنتجات النشطة فقط"
  safety_notes: []
  confidence: high

- id: expensive_products_above_avg
  question_ar: ما المنتجات التي سعرها أعلى من المتوسط؟
  question_en: Which products are priced above average?
  intent: filtering_subquery
  difficulty: medium
  required_tables:
  - Products
  required_columns:
  - ProductName
  - UnitPrice
  sql: |
    SELECT TOP 100 ProductName, UnitPrice
    FROM dbo.Products
    WHERE UnitPrice > (SELECT AVG(UnitPrice) FROM dbo.Products WHERE UnitPrice > 0)
      AND Discontinued = 0
    ORDER BY UnitPrice DESC;
  explanation: "استخدام subquery لحساب متوسط السعر ثم مقارنة كل منتج به"
  safety_notes: []
  confidence: high

- id: ex_out_of_stock_products
  question_ar: ما المنتجات التي نفد المخزون؟
  question_en: Which products are out of stock?
  intent: filtering
  difficulty: simple
  required_tables:
  - Products
  required_columns:
  - ProductName
  - UnitsInStock
  sql: |
    SELECT ProductName, UnitsInStock
    FROM dbo.Products
    WHERE UnitsInStock = 0
      AND Discontinued = 0
    ORDER BY ProductName;
  explanation: "تصفية المنتجات النشطة التي وصل المخزون فيها لصفر"
  safety_notes: []
  confidence: high

- id: ex_products_need_reorder
  question_ar: أي منتجات تحتاج إعادة طلب؟
  question_en: Which products need reordering?
  intent: filtering
  difficulty: medium
  required_tables:
  - Products
  required_columns:
  - ProductName
  - UnitsInStock
  - ReorderLevel
  sql: |
    SELECT ProductName, UnitsInStock, ReorderLevel
    FROM dbo.Products
    WHERE UnitsInStock <= ReorderLevel
      AND Discontinued = 0
    ORDER BY UnitsInStock ASC;
  explanation: "المنتجات التي وصل مخزونها لمستوى إعادة الطلب أو أقل"
  safety_notes: []
  confidence: high

# ─── Employee Performance ─────────────────────────────────────────────

- id: ex_employee_sales_ranking
  question_ar: ما ترتيب الموظفين حسب المبيعات؟
  question_en: Rank employees by their sales?
  intent: ranking
  difficulty: advanced
  required_tables:
  - Employees
  - Orders
  - "Order Details"
  required_columns:
  - FirstName
  - LastName
  - UnitPrice
  - Quantity
  - Discount
  sql: |
    SELECT TOP 10 e.FirstName + ' ' + e.LastName AS [EmployeeName],
           SUM(od.UnitPrice * od.Quantity * (1 - od.Discount)) AS [TotalSales]
    FROM dbo.Employees AS e
    INNER JOIN dbo.Orders AS o ON e.EmployeeID = o.EmployeeID
    INNER JOIN dbo.[Order Details] AS od ON o.OrderID = od.OrderID
    GROUP BY e.FirstName, e.LastName
    ORDER BY [TotalSales] DESC;
  explanation: "ربط الموظفين بطلباتهم ثم ببنود الطلبات لحساب إجمالي مبيعات كل موظف"
  safety_notes: []
  confidence: high

- id: ex_orders_per_employee
  question_ar: كم عدد الطلبات التي عالجها كل موظف؟
  question_en: How many orders did each employee process?
  intent: aggregation_join
  difficulty: medium
  required_tables:
  - Employees
  - Orders
  required_columns:
  - FirstName
  - LastName
  - OrderID
  sql: |
    SELECT e.FirstName + ' ' + e.LastName AS [EmployeeName],
           COUNT(o.OrderID) AS [OrderCount]
    FROM dbo.Employees AS e
    INNER JOIN dbo.Orders AS o ON e.EmployeeID = o.EmployeeID
    GROUP BY e.FirstName, e.LastName
    ORDER BY [OrderCount] DESC;
  explanation: "عد الطلبات المعالجة من كل موظف"
  safety_notes: []
  confidence: high

# ─── Customer Analysis ────────────────────────────────────────────────

- id: ex_customers_per_country
  question_ar: كم عدد العملاء في كل دولة؟
  question_en: How many customers per country?
  intent: grouping
  difficulty: simple
  required_tables:
  - Customers
  required_columns:
  - Country
  - CustomerID
  sql: |
    SELECT Country, COUNT(CustomerID) AS [CustomerCount]
    FROM dbo.Customers
    GROUP BY Country
    ORDER BY [CustomerCount] DESC;
  explanation: "تجميع العملاء حسب الدولة"
  safety_notes: []
  confidence: high

- id: ex_customer_order_count
  question_ar: كم طلب قدم كل عميل؟
  question_en: How many orders did each customer place?
  intent: aggregation_join
  difficulty: medium
  required_tables:
  - Customers
  - Orders
  required_columns:
  - CompanyName
  - OrderID
  sql: |
    SELECT TOP 50 c.CompanyName,
           COUNT(o.OrderID) AS [OrderCount]
    FROM dbo.Customers AS c
    INNER JOIN dbo.Orders AS o ON c.CustomerID = o.CustomerID
    GROUP BY c.CompanyName
    ORDER BY [OrderCount] DESC;
  explanation: "ربط العملاء بطلباتهم وعدّها"
  safety_notes: []
  confidence: high

- id: ex_customers_no_orders
  question_ar: أي عملاء لم يقدموا أي طلبات؟
  question_en: Which customers have not placed any orders?
  intent: filtering
  difficulty: medium
  required_tables:
  - Customers
  - Orders
  required_columns:
  - CompanyName
  sql: |
    SELECT c.CompanyName
    FROM dbo.Customers AS c
    LEFT JOIN dbo.Orders AS o ON c.CustomerID = o.CustomerID
    WHERE o.OrderID IS NULL
    ORDER BY c.CompanyName;
  explanation: "استخدام LEFT JOIN للعثور على العملاء بدون طلبات"
  safety_notes: []
  confidence: high

# ─── Shipping & Freight ───────────────────────────────────────────────

- id: ex_shipper_order_count
  question_ar: كم طلب شحنت كل شركة شحن؟
  question_en: How many orders did each shipper deliver?
  intent: aggregation_join
  difficulty: medium
  required_tables:
  - Shippers
  - Orders
  required_columns:
  - CompanyName
  - OrderID
  sql: |
    SELECT s.CompanyName AS [ShipperName],
           COUNT(o.OrderID) AS [OrderCount]
    FROM dbo.Shippers AS s
    INNER JOIN dbo.Orders AS o ON s.ShipperID = o.ShipVia
    GROUP BY s.CompanyName
    ORDER BY [OrderCount] DESC;
  explanation: "ربط شركات الشحن بالطلبات عبر ShipVia"
  safety_notes: []
  confidence: high

- id: ex_avg_freight_per_shipper
  question_ar: ما متوسط تكلفة الشحن لكل شركة شحن؟
  question_en: What is the average freight per shipper?
  intent: aggregation_join
  difficulty: medium
  required_tables:
  - Shippers
  - Orders
  required_columns:
  - CompanyName
  - Freight
  sql: |
    SELECT s.CompanyName AS [ShipperName],
           AVG(o.Freight) AS [AvgFreight]
    FROM dbo.Shippers AS s
    INNER JOIN dbo.Orders AS o ON s.ShipperID = o.ShipVia
    WHERE o.Freight IS NOT NULL
    GROUP BY s.CompanyName
    ORDER BY [AvgFreight] DESC;
  explanation: "مقارنة متوسط تكلفة الشحن بين الشركات"
  safety_notes: []
  confidence: high

- id: ex_unshipped_orders
  question_ar: كم طلب لم يشحن بعد؟
  question_en: How many orders are not yet shipped?
  intent: aggregation
  difficulty: simple
  required_tables:
  - Orders
  required_columns:
  - OrderID
  - ShippedDate
  sql: |
    SELECT COUNT(OrderID) AS [UnshippedCount]
    FROM dbo.Orders
    WHERE ShippedDate IS NULL;
  explanation: "عد الطلبات التي لم يشحن تاريخها بعد"
  safety_notes: []
  confidence: high

# ─── Supplier Analysis ────────────────────────────────────────────────

- id: ex_supplier_product_count
  question_ar: كم منتج يوفر كل مورد؟
  question_en: How many products does each supplier provide?
  intent: aggregation_join
  difficulty: medium
  required_tables:
  - Suppliers
  - Products
  required_columns:
  - CompanyName
  - ProductID
  sql: |
    SELECT s.CompanyName AS [SupplierName],
           COUNT(p.ProductID) AS [ProductCount]
    FROM dbo.Suppliers AS s
    INNER JOIN dbo.Products AS p ON s.SupplierID = p.SupplierID
    GROUP BY s.CompanyName
    ORDER BY [ProductCount] DESC;
  explanation: "ربط الموردين بمنتجاتهم وعدها"
  safety_notes: []
  confidence: high

- id: ex_supplier_revenue
  question_ar: ما إجمالي مبيعات منتجات كل مورد؟
  question_en: What is the total revenue from each supplier's products?
  intent: ranking
  difficulty: advanced
  required_tables:
  - Suppliers
  - Products
  - "Order Details"
  required_columns:
  - CompanyName
  - UnitPrice
  - Quantity
  - Discount
  sql: |
    SELECT TOP 20 s.CompanyName AS [SupplierName],
           SUM(od.UnitPrice * od.Quantity * (1 - od.Discount)) AS [SupplierRevenue]
    FROM dbo.Suppliers AS s
    INNER JOIN dbo.Products AS p ON s.SupplierID = p.SupplierID
    INNER JOIN dbo.[Order Details] AS od ON p.ProductID = od.ProductID
    GROUP BY s.CompanyName
    ORDER BY [SupplierRevenue] DESC;
  explanation: "ربط الموردين بالمنتجات ثم ببنود الطلبات لحساب إيرادات منتجات كل مورد"
  safety_notes: []
  confidence: high

# ─── Date-based Analysis ──────────────────────────────────────────────

- id: ex_orders_1997
  question_ar: كم طلب في سنة 1997؟
  question_en: How many orders were placed in 1997?
  intent: filtering_aggregation
  difficulty: simple
  required_tables:
  - Orders
  required_columns:
  - OrderID
  - OrderDate
  sql: |
    SELECT COUNT(OrderID) AS [OrderCount]
    FROM dbo.Orders
    WHERE OrderDate >= '19970101' AND OrderDate < '19980101';
  explanation: "تصفية الطلبات بنطاق تاريخ واستخدام شرط النطاق بدلاً من YEAR()"
  safety_notes: []
  confidence: high

- id: ex_yearly_revenue_comparison
  question_ar: قارن الإيرادات لكل سنة
  question_en: Compare revenue by year
  intent: time_series
  difficulty: advanced
  required_tables:
  - Orders
  - "Order Details"
  required_columns:
  - OrderDate
  - UnitPrice
  - Quantity
  - Discount
  sql: |
    SELECT YEAR(o.OrderDate) AS [Year],
           SUM(od.UnitPrice * od.Quantity * (1 - od.Discount)) AS [YearlyRevenue],
           COUNT(DISTINCT o.OrderID) AS [OrderCount]
    FROM dbo.Orders AS o
    INNER JOIN dbo.[Order Details] AS od ON o.OrderID = od.OrderID
    WHERE o.OrderDate IS NOT NULL
    GROUP BY YEAR(o.OrderDate)
    ORDER BY [Year];
  explanation: "مقارنة الإيرادات وعدد الطلبات لكل سنة"
  safety_notes: []
  confidence: high

# ─── Multi-JOIN Complex Queries ───────────────────────────────────────

- id: ex_full_order_detail
  question_ar: اعرض تفاصيل الطلبات مع اسم العميل والمنتج والموظف
  question_en: Show order details with customer name, product name, and employee name
  intent: lookup_join
  difficulty: advanced
  required_tables:
  - Customers
  - Orders
  - "Order Details"
  - Products
  - Employees
  required_columns:
  - CompanyName
  - ProductName
  - FirstName
  - LastName
  - OrderDate
  - UnitPrice
  - Quantity
  - Discount
  sql: |
    SELECT TOP 100 c.CompanyName AS [CustomerName],
           e.FirstName + ' ' + e.LastName AS [SalesPerson],
           p.ProductName,
           o.OrderDate,
           od.UnitPrice,
           od.Quantity,
           od.Discount,
           od.UnitPrice * od.Quantity * (1 - od.Discount) AS [LineTotal]
    FROM dbo.Customers AS c
    INNER JOIN dbo.Orders AS o ON c.CustomerID = o.CustomerID
    INNER JOIN dbo.Employees AS e ON o.EmployeeID = e.EmployeeID
    INNER JOIN dbo.[Order Details] AS od ON o.OrderID = od.OrderID
    INNER JOIN dbo.Products AS p ON od.ProductID = p.ProductID
    ORDER BY o.OrderDate DESC;
  explanation: "ربط 5 جداول لعرض تفاصيل الطلب الكاملة مع حساب إجمالي البند"
  safety_notes: []
  confidence: high

- id: ex_employee_sales_by_category
  question_ar: ما مبيعات كل موظف حسب فئة المنتج؟
  question_en: What are each employee's sales by product category?
  intent: aggregation_complex
  difficulty: advanced
  required_tables:
  - Employees
  - Orders
  - "Order Details"
  - Products
  - Categories
  required_columns:
  - FirstName
  - LastName
  - CategoryName
  - UnitPrice
  - Quantity
  - Discount
  sql: |
    SELECT TOP 50 e.FirstName + ' ' + e.LastName AS [EmployeeName],
           c.CategoryName,
           SUM(od.UnitPrice * od.Quantity * (1 - od.Discount)) AS [CategorySales]
    FROM dbo.Employees AS e
    INNER JOIN dbo.Orders AS o ON e.EmployeeID = o.EmployeeID
    INNER JOIN dbo.[Order Details] AS od ON o.OrderID = od.OrderID
    INNER JOIN dbo.Products AS p ON od.ProductID = p.ProductID
    INNER JOIN dbo.Categories AS c ON p.CategoryID = c.CategoryID
    GROUP BY e.FirstName, e.LastName, c.CategoryName
    ORDER BY [EmployeeName], [CategorySales] DESC;
  explanation: "ربط 5 جداول لتحليل مبيعات كل موظف حسب فئة المنتج"
  safety_notes: []
  confidence: high

# ─── Discount Analysis ────────────────────────────────────────────────

- id: ex_avg_discount_per_product
  question_ar: ما متوسط الخصم لكل منتج؟
  question_en: What is the average discount per product?
  intent: aggregation_join
  difficulty: medium
  required_tables:
  - Products
  - "Order Details"
  required_columns:
  - ProductName
  - Discount
  sql: |
    SELECT TOP 20 p.ProductName,
           AVG(od.Discount) AS [AvgDiscount],
           COUNT(*) AS [TimesSold]
    FROM dbo.Products AS p
    INNER JOIN dbo.[Order Details] AS od ON p.ProductID = od.ProductID
    WHERE od.Discount > 0
    GROUP BY p.ProductName
    ORDER BY [AvgDiscount] DESC;
  explanation: "حساب متوسط الخصم للمنتجات التي عليها خصم فعلي"
  safety_notes: []
  confidence: high

