  sql: 'SELECT TOP 100 CustomerID, CompanyName, City

    FROM dbo.Customers

    WHERE City IS NOT NULL

    ORDER BY CompanyName;'
  explanation: Filtered lookup on City.
  safety_notes: []
  confidence: medium
