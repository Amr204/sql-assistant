examples:
- id: ex_customers_lookup_top10
  question_ar: أعرض أول 10 سجلات من جدول Customers.
  question_en: Show the first 10 rows from Customers.
  intent: lookup
  difficulty: simple
  required_tables:
  - Customers
  required_columns:
  - CustomerID
  - CompanyName
  sql: 'SELECT TOP 10 CustomerID, CompanyName

    FROM dbo.Customers

    ORDER BY CompanyName;'
  explanation: Returns up to 10 rows from Customers ordered by CompanyName.
  safety_notes: []
  confidence: medium
- id: ex_customers_count
  question_ar: كم عدد السجلات في Customers؟
  question_en: How many rows are in Customers?
  intent: aggregation
  difficulty: simple
  required_tables:
  - Customers
  required_columns: []
  sql: 'SELECT COUNT(CustomerID) AS RowCount

    FROM dbo.Customers;'
  explanation: Counts all rows in Customers.
  safety_notes: []
  confidence: medium
- id: ex_customers_group_by_city
  question_ar: كم عدد سجلات Customers لكل City؟
  question_en: How many Customers rows per City?
  intent: grouping
  difficulty: medium
  required_tables:
  - Customers
  required_columns:
  - City
  sql: 'SELECT City, COUNT(CustomerID) AS Cnt

    FROM dbo.Customers

    GROUP BY City

    ORDER BY Cnt DESC;'
  explanation: Groups Customers by City.
  safety_notes: []
  confidence: medium
- id: ex_customers_filter_city
  question_ar: اعرض Customers حيث City غير فارغ.
  question_en: List Customers where City is not null.
  intent: filtering
  difficulty: simple
  required_tables:
  - Customers
  required_columns:
