- id: ex_orders_monthly_trend
  question_ar: اتجاه شهري لعدد سجلات Orders.
  question_en: Monthly row counts for Orders.
  intent: trends
  difficulty: analytical
  required_tables:
  - Orders
  required_columns:
  - OrderDate
  sql: 'SELECT YEAR(OrderDate) AS Y, MONTH(OrderDate) AS M, COUNT(OrderID) AS Cnt

    FROM dbo.Orders

    WHERE OrderDate IS NOT NULL

    GROUP BY YEAR(OrderDate), MONTH(OrderDate)

    ORDER BY Y, M;'
  explanation: Monthly aggregation on OrderDate.
  safety_notes: []
  confidence: low
