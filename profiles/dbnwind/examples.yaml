- id: ex_customercustomerdemo_join_customerdemographics
  question_ar: كم سجل في CustomerCustomerDemo لكل CustomerDemographics؟
  question_en: How many CustomerCustomerDemo rows per CustomerDemographics?
  intent: join
  difficulty: medium
  required_tables:
  - CustomerCustomerDemo
  - CustomerDemographics
  required_columns:
  - CustomerTypeID
  - CustomerTypeID
  - CustomerDesc
  sql: "SELECT p.CustomerDesc, COUNT(c.CustomerID) AS Cnt\nFROM dbo.CustomerCustomerDemo\
    \ AS c\nINNER JOIN dbo.CustomerDemographics AS p\n  ON p.CustomerTypeID = c.CustomerTypeID\n\
    GROUP BY p.CustomerDesc\nORDER BY Cnt DESC;"
  explanation: Join CustomerCustomerDemo → CustomerDemographics on FK.
  safety_notes: []
  confidence: medium
- id: ex_customercustomerdemo_rank_customerdemographics
  question_ar: أعلى 10 CustomerDemographics حسب عدد سجلات CustomerCustomerDemo.
  question_en: Top 10 CustomerDemographics by number of CustomerCustomerDemo rows.
  intent: ranking
  difficulty: advanced
  required_tables:
  - CustomerCustomerDemo
  - CustomerDemographics
  required_columns: []
  sql: "SELECT TOP 10 p.CustomerDesc, COUNT(*) AS Cnt\nFROM dbo.CustomerCustomerDemo\
    \ AS c\nINNER JOIN dbo.CustomerDemographics AS p\n  ON p.CustomerTypeID = c.CustomerTypeID\n\
    GROUP BY p.CustomerDesc\nORDER BY Cnt DESC;"
  explanation: Ranking parents by child row count.
  safety_notes: []
  confidence: medium
