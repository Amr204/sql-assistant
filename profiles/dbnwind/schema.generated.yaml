views:
- name: Customer and Suppliers by City
  schema: dbo
  columns: []
  definition: "SELECT City, CompanyName, ContactName, 'Customers' AS Relationship \nFROM Customers\nUNION SELECT City, CompanyName,\
    \ ContactName, 'Suppliers'\nFROM Suppliers\n--ORDER BY City, CompanyName"
- name: Alphabetical list of products
  schema: dbo
  columns: []
  definition: 'SELECT Products.*, Categories.CategoryName

    FROM Categories INNER JOIN Products ON Categories.CategoryID = Products.CategoryID

    WHERE (((Products.Discontinued)=0))'
- name: Current Product List
  schema: dbo
  columns: []
  definition: 'SELECT Product_List.ProductID, Product_List.ProductName

    FROM Products AS Product_List

    WHERE (((Product_List.Discontinued)=0))

    --ORDER BY Product_List.ProductName'
- name: Orders Qry
  schema: dbo
  columns: []
  definition: "SELECT Orders.OrderID, Orders.CustomerID, Orders.EmployeeID, Orders.OrderDate, Orders.RequiredDate, \n\tOrders.ShippedDate,\
    \ Orders.ShipVia, Orders.Freight, Orders.ShipName, Orders.ShipAddress, Orders.ShipCity, \n\tOrders.ShipRegion, Orders.ShipPostalCode,\
    \ Orders.ShipCountry, \n\tCustomers.CompanyName, Customers.Address, Customers.City, Customers.Region, Customers.PostalCode,\
    \ Customers.Country\nFROM Customers INNER JOIN Orders ON Customers.CustomerID = Orders.CustomerID"
- name: Products Above Average Price
  schema: dbo
  columns: []
  definition: 'SELECT Products.ProductName, Products.UnitPrice

    FROM Products

    WHERE Products.UnitPrice>(SELECT AVG(UnitPrice) From Products)

    --ORDER BY Products.UnitPrice DESC'
- name: Products by Category
  schema: dbo
  columns: []
  definition: 'SELECT Categories.CategoryName, Products.ProductName, Products.QuantityPerUnit, Products.UnitsInStock, Products.Discontinued

    FROM Categories INNER JOIN Products ON Categories.CategoryID = Products.CategoryID

    WHERE Products.Discontinued <> 1

    --ORDER BY Categories.CategoryName, Products.ProductName'
- name: Quarterly Orders
  schema: dbo
  columns: []
  definition: 'SELECT DISTINCT Customers.CustomerID, Customers.CompanyName, Customers.City, Customers.Country

    FROM Customers RIGHT JOIN Orders ON Customers.CustomerID = Orders.CustomerID

    WHERE Orders.OrderDate BETWEEN ''19970101'' And ''19971231'''
- name: Invoices
  schema: dbo
  columns: []
  definition: "SELECT Orders.ShipName, Orders.ShipAddress, Orders.ShipCity, Orders.ShipRegion, Orders.ShipPostalCode, \n\t\
    Orders.ShipCountry, Orders.CustomerID, Customers.CompanyName AS CustomerName, Customers.Address, Customers.City, \n\t\
    Customers.Region, Customers.PostalCode, Customers.Country, \n\t(FirstName + ' ' + LastName) AS Salesperson, \n\tOrders.OrderID,\
    \ Orders.OrderDate, Orders.RequiredDate, Orders.ShippedDate, Shippers.CompanyName As ShipperName, \n\t\"Order Details\"\
    .ProductID, Products.ProductName, \"Order Details\".UnitPrice, \"Order Details\".Quantity, \n\t\"Order Details\".Discount,\
    \ \n\t(CONVERT(money,(\"Order Details\".UnitPrice*Quantity*(1-Discount)/100))*100) AS ExtendedPrice, Orders.Freight\n\
    FROM \tShippers INNER JOIN \n\t\t(Products INNER JOIN \n\t\t\t(\n\t\t\t\t(Employees INNER JOIN \n\t\t\t\t\t(Customers\
    \ INNER JOIN Orders ON Customers.CustomerID = Orders.CustomerID) \n\t\t\t\tON Employees.EmployeeID = Orders.EmployeeID)\
    \ \n\t\t\tINNER JOIN \"Order Details\" ON Orders.OrderID = \"Order Details\".OrderID) \n\t\tON Products.ProductID = \"\
    Order Details\".ProductID) \n\tON Shippers.ShipperID = Orders.ShipVia"
- name: Order Details Extended
  schema: dbo
  columns: []
  definition: "SELECT \"Order Details\".OrderID, \"Order Details\".ProductID, Products.ProductName, \n\t\"Order Details\"\
    .UnitPrice, \"Order Details\".Quantity, \"Order Details\".Discount, \n\t(CONVERT(money,(\"Order Details\".UnitPrice*Quantity*(1-Discount)/100))*100)\
    \ AS ExtendedPrice\nFROM Products INNER JOIN \"Order Details\" ON Products.ProductID = \"Order Details\".ProductID\n--ORDER\
    \ BY \"Order Details\".OrderID"
- name: Order Subtotals
  schema: dbo
  columns: []
  definition: 'SELECT "Order Details".OrderID, Sum(CONVERT(money,("Order Details".UnitPrice*Quantity*(1-Discount)/100))*100)
    AS Subtotal

    FROM "Order Details"

    GROUP BY "Order Details".OrderID'
- name: Product Sales for 1997
  schema: dbo
  columns: []
  definition: "SELECT Categories.CategoryName, Products.ProductName, \nSum(CONVERT(money,(\"Order Details\".UnitPrice*Quantity*(1-Discount)/100))*100)\
    \ AS ProductSales\nFROM (Categories INNER JOIN Products ON Categories.CategoryID = Products.CategoryID) \n\tINNER JOIN\
    \ (Orders \n\t\tINNER JOIN \"Order Details\" ON Orders.OrderID = \"Order Details\".OrderID) \n\tON Products.ProductID\
    \ = \"Order Details\".ProductID\nWHERE (((Orders.ShippedDate) Between '19970101' And '19971231'))\nGROUP BY Categories.CategoryName,\
    \ Products.ProductName"
- name: Category Sales for 1997
  schema: dbo
  columns: []
  definition: 'SELECT "Product Sales for 1997".CategoryName, Sum("Product Sales for 1997".ProductSales) AS CategorySales

    FROM "Product Sales for 1997"

    GROUP BY "Product Sales for 1997".CategoryName'
- name: Sales by Category
  schema: dbo
  columns: []
  definition: "SELECT Categories.CategoryID, Categories.CategoryName, Products.ProductName, \n\tSum(\"Order Details Extended\"\
    .ExtendedPrice) AS ProductSales\nFROM \tCategories INNER JOIN \n\t\t(Products INNER JOIN \n\t\t\t(Orders INNER JOIN \"\
    Order Details Extended\" ON Orders.OrderID = \"Order Details Extended\".OrderID) \n\t\tON Products.ProductID = \"Order\
    \ Details Extended\".ProductID) \n\tON Categories.CategoryID = Products.CategoryID\nWHERE Orders.OrderDate BETWEEN '19970101'\
    \ And '19971231'\nGROUP BY Categories.CategoryID, Categories.CategoryName, Products.ProductName\n--ORDER BY Products.ProductName"
- name: Sales Totals by Amount
  schema: dbo
  columns: []
  definition: "SELECT \"Order Subtotals\".Subtotal AS SaleAmount, Orders.OrderID, Customers.CompanyName, Orders.ShippedDate\n\
    FROM \tCustomers INNER JOIN \n\t\t(Orders INNER JOIN \"Order Subtotals\" ON Orders.OrderID = \"Order Subtotals\".OrderID)\
    \ \n\tON Customers.CustomerID = Orders.CustomerID\nWHERE (\"Order Subtotals\".Subtotal >2500) AND (Orders.ShippedDate\
    \ BETWEEN '19970101' And '19971231')"
- name: Summary of Sales by Quarter
  schema: dbo
  columns: []
  definition: 'SELECT Orders.ShippedDate, Orders.OrderID, "Order Subtotals".Subtotal

    FROM Orders INNER JOIN "Order Subtotals" ON Orders.OrderID = "Order Subtotals".OrderID

    WHERE Orders.ShippedDate IS NOT NULL

    --ORDER BY Orders.ShippedDate'
- name: Summary of Sales by Year
  schema: dbo
  columns: []
  definition: 'SELECT Orders.ShippedDate, Orders.OrderID, "Order Subtotals".Subtotal

    FROM Orders INNER JOIN "Order Subtotals" ON Orders.OrderID = "Order Subtotals".OrderID

    WHERE Orders.ShippedDate IS NOT NULL

    --ORDER BY Orders.ShippedDate'
stored_procedures:
- name: CustOrderHist
  schema: dbo
  definition: '@CustomerID nchar(5)

    AS

    SELECT ProductName, Total=SUM(Quantity)

    FROM Products P, [Order Details] OD, Orders O, Customers C

    WHERE C.CustomerID = @CustomerID

    AND C.CustomerID = O.CustomerID AND O.OrderID = OD.OrderID AND OD.ProductID = P.ProductID

    GROUP BY ProductName'
- name: CustOrdersDetail
  schema: dbo
  definition: "@OrderID int\nAS\nSELECT ProductName,\n    UnitPrice=ROUND(Od.UnitPrice, 2),\n    Quantity,\n    Discount=CONVERT(int,\
    \ Discount * 100), \n    ExtendedPrice=ROUND(CONVERT(money, Quantity * (1 - Discount) * Od.UnitPrice), 2)\nFROM Products\
    \ P, [Order Details] Od\nWHERE Od.ProductID = P.ProductID and Od.OrderID = @OrderID"
- name: CustOrdersOrders
  schema: dbo
  definition: "@CustomerID nchar(5)\nAS\nSELECT OrderID, \n\tOrderDate,\n\tRequiredDate,\n\tShippedDate\nFROM Orders\nWHERE\
    \ CustomerID = @CustomerID\nORDER BY OrderID"
- name: Employee Sales by Country
  schema: dbo
  definition: "@Beginning_Date DateTime, @Ending_Date DateTime AS\nSELECT Employees.Country, Employees.LastName, Employees.FirstName,\
    \ Orders.ShippedDate, Orders.OrderID, \"Order Subtotals\".Subtotal AS SaleAmount\nFROM Employees INNER JOIN \n\t(Orders\
    \ INNER JOIN \"Order Subtotals\" ON Orders.OrderID = \"Order Subtotals\".OrderID) \n\tON Employees.EmployeeID = Orders.EmployeeID\n\
    WHERE Orders.ShippedDate Between @Beginning_Date And @Ending_Date"
- name: Sales by Year
  schema: dbo
  definition: '@Beginning_Date DateTime, @Ending_Date DateTime AS

    SELECT Orders.ShippedDate, Orders.OrderID, "Order Subtotals".Subtotal, DATENAME(yy,ShippedDate) AS Year

    FROM Orders INNER JOIN "Order Subtotals" ON Orders.OrderID = "Order Subtotals".OrderID

    WHERE Orders.ShippedDate Between @Beginning_Date And @Ending_Date'
- name: SalesByCategory
  schema: dbo
  definition: "@CategoryName nvarchar(15), @OrdYear nvarchar(4) = '1998'\nAS\nIF @OrdYear != '1996' AND @OrdYear != '1997'\
    \ AND @OrdYear != '1998' \nBEGIN\n\tSELECT @OrdYear = '1998'\nEND\n\nSELECT ProductName,\n\tTotalPurchase=ROUND(SUM(CONVERT(decimal(14,2),\
    \ OD.Quantity * (1-OD.Discount) * OD.UnitPrice)), 0)\nFROM [Order Details] OD, Orders O, Products P, Categories C\nWHERE\
    \ OD.OrderID = O.OrderID \n\tAND OD.ProductID = P.ProductID \n\tAND P.CategoryID = C.CategoryID\n\tAND C.CategoryName\
    \ = @CategoryName\n\tAND SUBSTRING(CONVERT(nvarchar(22), O.OrderDate, 111), 1, 4) = @OrdYear\nGROUP BY ProductName\nORDER\
    \ BY ProductName"
- name: Ten Most Expensive Products
  schema: dbo
  definition: 'AS

    SET ROWCOUNT 10

    SELECT Products.ProductName AS TenMostExpensiveProducts, Products.UnitPrice

    FROM Products

    ORDER BY Products.UnitPrice DESC'
