questions:
# ─── Simple Aggregation ─────────────────────────────────────────────
- id: eval_001
  question_ar: كم عدد العملاء؟
  question_en: How many customers are there?
  expected_tables:
  - Customers
  tags:
  - count
  - simple
  must_reject: false

- id: eval_002
  question_ar: كم عدد المنتجات النشطة؟
  question_en: How many active products are there?
