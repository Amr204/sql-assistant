- id: ex_orders_latest_by_orderdate
  question_ar: ما أحدث سجلات Orders؟
  question_en: What are the most recent Orders records?
  intent: latest_records
  difficulty: medium
  required_tables:
  - Orders
  required_columns:
  - OrderDate
  - OrderID
  sql: 'SELECT TOP 10 OrderID, OrderDate

    FROM dbo.Orders

    ORDER BY OrderDate DESC;'
  explanation: Latest Orders by OrderDate.
  safety_notes: []
  confidence: medium
- id: ex_orders_monthly_trend
  question_ar: اتجاه شهري لعدد سجلات Orders.
  question_en: Monthly row counts for Orders.
  intent: trends
  difficulty: analytical
  required_tables:
  - Orders
  required_columns:
  - OrderDate
  sql: 'SELECT YEAR(OrderDate) AS Y, MONTH(OrderDate) AS M, COUNT(OrderID) AS Cnt

    FROM dbo.Orders

    WHERE OrderDate IS NOT NULL

    GROUP BY YEAR(OrderDate), MONTH(OrderDate)

    ORDER BY Y, M;'
  explanation: Monthly aggregation on OrderDate.
  safety_notes: []
  confidence: low
