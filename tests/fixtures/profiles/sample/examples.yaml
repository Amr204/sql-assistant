- id: ex_orders_join_customers
  question_ar: كم سجل في Orders لكل Customers؟
  question_en: How many Orders rows per Customers?
  intent: join
  difficulty: medium
  required_tables:
  - Orders
  - Customers
  required_columns:
  - CustomerID
  - CustomerID
  - CompanyName
  sql: "SELECT p.CompanyName, COUNT(c.OrderID) AS Cnt\nFROM dbo.Orders AS c\nINNER\
    \ JOIN dbo.Customers AS p\n  ON p.CustomerID = c.CustomerID\nGROUP BY p.CompanyName\n\
    ORDER BY Cnt DESC;"
  explanation: Join Orders → Customers on FK.
  safety_notes: []
  confidence: medium
- id: ex_orders_rank_customers
  question_ar: أعلى 10 Customers حسب عدد سجلات Orders.
  question_en: Top 10 Customers by number of Orders rows.
  intent: ranking
  difficulty: advanced
  required_tables:
  - Orders
  - Customers
  required_columns: []
  sql: "SELECT TOP 10 p.CompanyName, COUNT(*) AS Cnt\nFROM dbo.Orders AS c\nINNER\
    \ JOIN dbo.Customers AS p\n  ON p.CustomerID = c.CustomerID\nGROUP BY p.CompanyName\n\
    ORDER BY Cnt DESC;"
  explanation: Ranking parents by child row count.
  safety_notes: []
  confidence: medium
- id: ex_order_details_join_orders
  question_ar: كم سجل في Order Details لكل Orders؟
  question_en: How many Order Details rows per Orders?
  intent: join
  difficulty: medium
  required_tables:
  - Order Details
  - Orders
  required_columns:
  - OrderID
  - OrderID
  - CustomerID
  sql: "SELECT p.CustomerID, COUNT(c.OrderID) AS Cnt\nFROM dbo.[Order Details] AS\
    \ c\nINNER JOIN dbo.Orders AS p\n  ON p.OrderID = c.OrderID\nGROUP BY p.CustomerID\n\
    ORDER BY Cnt DESC;"
  explanation: Join Order Details → Orders on FK.
  safety_notes: []
  confidence: medium
- id: ex_order_details_rank_orders
  question_ar: أعلى 10 Orders حسب عدد سجلات Order Details.
